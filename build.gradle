// Root project: no Loom, no JAR. Server and client are separate subprojects.
subprojects {
	group = rootProject.findProperty('maven_group') ?: 'com.kiemhiep'
	version = rootProject.findProperty('mod_version') ?: '1.0.0'
	ext.minecraft_version = rootProject.findProperty('minecraft_version')
	ext.loader_version = rootProject.findProperty('loader_version')
	ext.loom_version = rootProject.findProperty('loom_version')
	ext.fabric_api_version = rootProject.findProperty('fabric_api_version')
}
