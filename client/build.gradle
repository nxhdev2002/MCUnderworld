plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
	id 'maven-publish'
}

base {
	archivesName = 'kiemhiep-client'
}

repositories {
	mavenCentral()
}

loom {
	mods {
		"kiemhiep" {
			sourceSet sourceSets.main
		}
	}
}

fabricApi {
	configureDataGeneration {
		client = true
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
	implementation project(':common')
}

processResources {
	inputs.property "version", project.version
	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	// Include common classes (e.g. MeteorEntity) so client JAR has them at runtime
	dependsOn ':common:classes'
	from(project(':common').file("build/classes/java/main"))
	from(project(':common').file("build/resources/main")) {
		exclude 'fabric.mod.json'
		duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	}
	from(rootProject.file("LICENSE")) {
		rename { "${it}_${project.base.archivesName.get()}" }
	}
}
